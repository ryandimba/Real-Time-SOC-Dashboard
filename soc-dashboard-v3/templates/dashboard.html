<html>

<head>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="p-10">

<h1 class="text-3xl mb-10">SOC Security Dashboard</h1>

<div class="grid grid-cols-4 gap-6 mb-10">

<div class="bg-gray-800 p-6 rounded-xl">
<p class="text-gray-400">Uptime</p>
<p class="text-green-400 text-2xl">99.98%</p>
</div>

<div class="bg-gray-800 p-6 rounded-xl">
<p class="text-gray-400">Threats Blocked</p>
<p class="text-red-400 text-2xl">342</p>
</div>

<div class="bg-gray-800 p-6 rounded-xl">
<p class="text-gray-400">Open Incidents</p>
<p class="text-yellow-400 text-2xl">12</p>
</div>

<div class="bg-gray-800 p-6 rounded-xl">
<p class="text-gray-400">MTTR</p>
<p class="text-2xl">18m</p>
</div>

</div>

<div class="bg-gray-800 p-6 rounded-xl mb-10">

<canvas id="healthChart"></canvas>

</div>

<div class="bg-gray-800 p-6 rounded-xl mb-10">

<h2 class="text-xl mb-4">Global Attack Map</h2>

<div id="map" style="height:400px"></div>

</div>

<div class="bg-gray-800 p-6 rounded-xl mb-10">

<h2 class="text-xl mb-4">Live Security Logs</h2>

<div id="logs" class="h-60 overflow-y-scroll font-mono text-sm"></div>

</div>

</div>

<script src="/static/js/chart.js"></script>
<script src="/static/js/attack-map.js"></script>
<script src="/static/js/logs.js"></script>

</body>

</html>
